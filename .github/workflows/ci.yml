name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Ruff and Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest -q

  docker-smoke:
    name: Docker local.prod smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare local production env
        run: cp .env.local.prod.example .env.local.prod

      - name: Smoke test production-like compose stack
        run: KEEP_RUNNING=0 ./scripts/smoke-local-prod.sh

