services:
  api:
    image: ${API_IMAGE:-tezqr:prod}
    build:
      context: .
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://tezqr:${POSTGRES_PASSWORD}@db:5432/tezqr
    command: ["./scripts/start-prod.sh"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tezqr
      POSTGRES_USER: tezqr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tezqr_prod_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tezqr -d tezqr"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  tezqr_prod_db:
  caddy_data:
  caddy_config:
